<?xml version="1.0" encoding="UTF-8"?>
<!-- Lab probe: HTML event handler inside foreignObject (runs only in full SVG document / some viewers) -->
<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <circle cx="64" cy="64" r="56" fill="#44403c"/>
  <foreignObject x="8" y="40" width="112" height="48">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <button type="button" style="font:11px sans-serif" onclick="void 0">btn onclick</button>
    </div>
  </foreignObject>
  <text x="64" y="28" fill="#fafaf9" font-size="9" text-anchor="middle">foreignObject+onclick</text>
</svg>
